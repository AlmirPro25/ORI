server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para velocidade
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 🚀 Frontend React SPA catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 📡 Passa API para Backend (Node.js)
    # IMPORTANTE: No Docker Compose, o servico se chama 'backend'
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 🎥 Passa HLS e Streams para Backend
    location /hls/ {
        proxy_pass http://backend:3000/hls/;
        # Cache de segmentos HLS
        expires 30s;
        add_header Cache-Control "public";
    }

    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
