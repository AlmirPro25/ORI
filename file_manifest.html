<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-8">
        <div class="bg-gray-800 rounded-xl p-6 shadow-2xl">
            <h1 class="text-3xl font-bold mb-4 flex items-center gap-3">
                🏢 Projeto Enterprise Completo
            </h1>
            <p class="text-gray-400 mb-6">
                Este projeto contém TODOS os arquivos gerados pelo Enterprise Pipeline.
            </p>

            <h2 class="text-xl font-semibold mb-3 text-blue-400">📦 Arquivos do Projeto</h2>
            <div class="bg-gray-900 rounded-lg p-4 mb-6">
                <ul class="space-y-2">
                    <li class="flex items-center gap-2">
                        <span class="text-green-400">✓</span>
                        <code class="text-sm bg-gray-800 px-2 py-1 rounded">Arquivos Injetados via Script</code>
                        <span class="text-xs text-gray-500">(verifique console ou source)</span>
                    </li>
                </ul>
            </div>

            <div class="bg-blue-900/30 border border-blue-500/30 rounded-lg p-4">
                <h3 class="font-semibold text-blue-400 mb-2">💡 Como usar:</h3>
                <ol class="list-decimal list-inside space-y-1 text-gray-300">
                    <li>O agente irá processar e criar cada arquivo listado no HTML.</li>
                </ol>
            </div>
        </div>
    </div>
</body>

</html>
